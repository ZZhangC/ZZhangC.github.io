<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZZhangC's Blog</title>
    <style type="text/css">
        div.back{
            background-repeat:no-repeat;
            background-attachment:fixed;
            position: relative;
            left: 0px;
			top: 0px;
            background-image: url("../images/Blog_BG.png");

            height: auto;
        }
        div.front{

            border-radius: 10%;

            margin:0 auto;
            width: auto;
            height: auto;
            background-color:rgba(255, 255, 255, 0.65);
        }
        h1{
            opacity: 1.0;
            text-align: center;
            font-size: 50px;
        }
        h2{
            opacity: 1.0;
            text-align: center;
            font-size: 25px;
        }
        h3{

            font-size: 18px;
        }
        p.titles{
            text-align: center;
            font-weight: bolder;
        }
        p.text{
            font-weight: bold;
            text-align: center;
        }
        a{
            text-decoration:none;
            color: white;
        }
        a:hover{
            color: gray;
        }
    </style>
</head>

</html>
